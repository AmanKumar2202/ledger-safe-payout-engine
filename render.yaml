services:
  - type: web
    name: ledger-safe-payout-engine
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: playto-payout-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-payout-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: ledger-safe-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: ledger-safe-payout-engine
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: playto-payout-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-payout-redis
          property: connectionString

databases:
  - name: playto-payout-db
    databaseName: playto_payout_db
    user: postgres
    plan: free

  - name: playto-payout-redis
    plan: free
    type: redis
    maxmemoryPolicy: noeviction