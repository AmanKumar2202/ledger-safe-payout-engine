version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playto_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=local-docker-secret-key
      - DATABASE_URL=postgres://user:password@db:5432/playto_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A config worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=local-docker-secret-key
      - DATABASE_URL=postgres://user:password@db:5432/playto_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis